<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Tugas LMS - Telkom University</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0e27;
      --bg-card: #141932;
      --bg-card-hover: #1a1f3a;
      --accent-purple: #a78bfa;
      --accent-pink: #f472b6;
      --accent-cyan: #22d3ee;
      --accent-green: #4ade80;
      --accent-orange: #fb923c;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: rgba(148, 163, 184, 0.1);
    }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%; right: -20%;
      width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(167,139,250,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 24px 16px 120px; position: relative; z-index: 1; }
    
    .header {
      background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(34,211,238,0.05));
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 32px 24px;
      margin-bottom: 24px;
      backdrop-filter: blur(20px);
    }
    .header-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(167,139,250,0.3);
    }
    .header h1 {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
    }
    .stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .value { font-size: 32px; font-weight: 800; font-family: 'Space Mono', monospace; }

    .filters { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; }
    .filter-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px; font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      cursor: pointer;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(167,139,250,0.3);
    }

    .assignment-list { display: flex; flex-direction: column; gap: 12px; }
    .assignment-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px;
    }
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      border: none; border-radius: 20px; color: white;
      font-size: 32px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(167,139,250,0.4);
      z-index: 1000;
    }
    .modal {
      display: none; position: fixed; inset: 0;
      background: rgba(10,14,39,0.9); backdrop-filter: blur(10px);
      z-index: 2000; align-items: flex-end;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 28px 28px 0 0;
      padding: 32px 24px; width: 100%; max-height: 85vh; overflow-y: auto;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 14px 16px; background: var(--bg-primary);
      border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-primary);
    }
    .submit-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      color: white; border: none; border-radius: 16px; font-weight: 700;
    }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="notification-banner" style="background: linear-gradient(135deg, rgba(251,146,60,0.1), rgba(244,114,182,0.1)); border: 1px solid rgba(251,146,60,0.3); border-radius: 16px; padding: 16px 20px; margin-bottom: 24px; display: none; align-items: center; gap: 16px;">
      <div>🔔</div>
      <div>Aktifkan notifikasi untuk dapat reminder otomatis 24 jam sebelum deadline</div>
      <button onclick="requestNotificationPermission()">Aktifkan</button>
    </div>

    <div class="header">
      <div class="header-icon">📚</div>
      <h1>Tugas LMS</h1>
      <p>Telkom University</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Total Tugas</div>
        <div class="value" id="total-count">0</div>
      </div>
      <div class="stat-card">
        <div class="label">H-1 Deadline</div>
        <div class="value" id="urgent-count">0</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Semua</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Aktif</button>
      <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Selesai</button>
      <button class="filter-btn" data-filter="urgent" onclick="setFilter('urgent')">Mendesak</button>
    </div>

    <div id="assignment-list" class="assignment-list"></div>
  </div>

  <button class="fab" onclick="openModal()">+</button>

  <div id="modal" class="modal" onclick="if(event.target.id==='modal') closeModal()">
    <div class="modal-content">
      <h2>Tugas Baru</h2>
      <form onsubmit="addAssignment(event)">
        <div class="form-group">
          <label>Judul Tugas *</label>
          <input type="text" id="title" required placeholder="UTS Pemrograman Web">
        </div>
        <div class="form-group">
          <label>Mata Kuliah *</label>
          <input type="text" id="course" required placeholder="Pemrograman Web">
        </div>
        <div class="form-group">
          <label>Deadline *</label>
          <input type="datetime-local" id="deadline" required>
        </div>
        <div class="form-group">
          <label>Catatan (Opsional)</label>
          <textarea id="notes" placeholder="Detail atau catatan tambahan..."></textarea>
        </div>
        <button type="submit" class="submit-btn">Simpan Tugas</button>
      </form>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCLM0McB2sZdVJqPfPYdPSQolKmLAQCQvw",
      authDomain: "lms-tugas-fathul.firebaseapp.com",
      databaseURL: "https://lms-tugas-fathul-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "lms-tugas-fathul",
      storageBucket: "lms-tugas-fathul.firebasestorage.app",
      messagingSenderId: "827323874290",
      appId: "1:827323874290:web:311ebcbd254173e9cb49b6b"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const assignmentsRef = database.ref('lms-assignments');

    let assignments = [];
    let currentFilter = 'all';

    function loadData() {
      assignmentsRef.on('value', (snapshot) => {
        assignments = snapshot.val() ? Object.values(snapshot.val()) : [];
        renderAssignments();
      });
    }

    function saveToFirebase() {
      assignmentsRef.set(assignments);
    }

    function openModal() {
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    function addAssignment(e) {
      e.preventDefault();
      const assignment = {
        id: Date.now(),
        title: document.getElementById('title').value,
        course: document.getElementById('course').value,
        deadline: document.getElementById('deadline').value,
        notes: document.getElementById('notes').value || '',
        completed: false
      };
      assignments.push(assignment);
      saveToFirebase();
      renderAssignments();
      closeModal();
    }

    function toggleComplete(index) {
      assignments[index].completed = !assignments[index].completed;
      saveToFirebase();
      renderAssignments();
    }

    function deleteAssignment(index) {
      if (confirm('Yakin mau hapus tugas ini?')) {
        assignments.splice(index, 1);
        saveToFirebase();
        renderAssignments();
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      renderAssignments();
    }

    function renderAssignments() {
      const container = document.getElementById('assignment-list');
      let filtered = assignments;

      if (currentFilter === 'active') filtered = assignments.filter(a => !a.completed);
      if (currentFilter === 'completed') filtered = assignments.filter(a => a.completed);
      if (currentFilter === 'urgent') filtered = assignments.filter(a => !a.completed && isUrgent(a.deadline));

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">Belum ada tugas</div>`;
        return;
      }

      container.innerHTML = filtered.map((a, i) => `
        <div class="assignment-card">
          <div style="color: var(--accent-cyan); font-size: 13px; font-weight: 700;">${a.course}</div>
          <div style="font-weight: 700; margin: 8px 0;">${a.title}</div>
          <div style="font-size: 13px; color: var(--text-secondary);">${a.deadline}</div>
          ${a.notes ? `<div style="margin-top: 12px; font-size: 13px; color: var(--text-muted);">${a.notes}</div>` : ''}
          <div style="margin-top: 16px; display: flex; gap: 8px;">
            <button onclick="toggleComplete(${i})" style="flex:1; padding:12px; background: ${a.completed ? '#64748b' : 'linear-gradient(135deg, #4ade80, #22d3ee)'}; color:white; border:none; border-radius:12px;">${a.completed ? 'Batal Selesai' : '✓ Selesai'}</button>
            <button onclick="deleteAssignment(${i})" style="padding:12px 16px; background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink)); color:white; border:none; border-radius:12px;">🗑</button>
          </div>
        </div>
      `).join('');
    }

    function isUrgent(deadline) {
      const diff = new Date(deadline) - new Date();
      return diff > 0 && diff / (1000*60*60) <= 24;
    }

    // Mulai aplikasi
    loadData();
    renderAssignments();
  </script>
</body>
</html>
